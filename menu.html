<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fffcf6" />
    <!-- Mode plein écran iOS (si ajout à l'écran d'accueil) : la page passe sous
         la status bar pour un rendu immersif, sans bande blanche séparée. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="ClickOne - commande restaurant par QR code" />
    <title>ClickOne · Table 7</title>
    <script>
      // Hydrate la saison choisie AVANT le premier rendu pour éviter tout
      // flash du thème par défaut (FOUT). Aucune saison sauvegardée = ClickOne d'origine.
      try {
        var s = localStorage.getItem('clickone:season');
        if (s === 'spring' || s === 'summer' || s === 'autumn' || s === 'winter') {
          document.documentElement.setAttribute('data-season', s);
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
