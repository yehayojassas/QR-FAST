# Configuration de déploiement Render (https://render.com)
# Web Service Node : Render installe les dépendances, construit le front (Vite),
# puis lance le serveur Node (server.js) qui sert le menu, la page serveurs
# et l'API temps réel des commandes.
services:
  - type: web
    name: clickone-menu
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
